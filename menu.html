<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Меню | Вкусовщина</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Roboto:wght@300;400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0a0505;
            color: #f5efe8;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* НАВИГАЦИЯ (бургер) */
        .nav {
            background: rgba(10, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2a1a15;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #f5efe8;
            letter-spacing: 2px;
            text-decoration: none;
        }
        .nav .logo span { color: #c9a96e; }

        .nav .menu-toggle {
            display: flex;
            flex-direction: column;
            cursor: pointer;
            padding: 4px;
            background: none;
            border: none;
            gap: 5px;
        }
        .nav .menu-toggle span {
            display: block;
            width: 28px;
            height: 2px;
            background: #d4c9c0;
            border-radius: 2px;
            transition: 0.3s;
        }
        .nav .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .nav .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .nav .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        .nav .nav-links {
            display: none;
            flex-direction: column;
            position: absolute;
            top: 60px;
            left: 0;
            right: 0;
            background: rgba(10, 5, 5, 0.98);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-bottom: 1px solid #2a1a15;
            gap: 12px;
        }
        .nav .nav-links.open { display: flex; }
        .nav .nav-links a {
            color: #d4c9c0;
            text-decoration: none;
            font-weight: 400;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 12px 0;
            border-bottom: 1px solid #1a0f0f;
            text-align: center;
        }
        .nav .nav-links a:last-child { border-bottom: none; }
        .nav .nav-links a:hover { color: #c9a96e; }

        /* ОСНОВНОЙ КОНТЕЙНЕР */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px 16px;
        }
        .section-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .section-header .subtitle {
            font-size: 0.65rem;
            color: #c9a96e;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 4px;
        }
        .section-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 5vw, 2.4rem);
            color: #f5efe8;
            font-weight: 600;
            letter-spacing: 1px;
        }
        .section-line {
            width: 40px;
            height: 2px;
            background: #c9a96e;
            margin: 8px auto 0;
        }

        .popular-section {
            margin-bottom: 35px;
        }
        .popular-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #c9a96e;
            text-align: center;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        /* СЕТКА МЕНЮ (1 колонка на телефоне, 2 на планшете) */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }
        .menu-item {
            background: rgba(26, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px 16px;
            border: 1px solid rgba(201, 169, 110, 0.15);
            transition: all 0.3s;
            text-align: center;
            position: relative;
        }
        .menu-item .emoji {
            font-size: 2.6rem;
            display: block;
            margin-bottom: 6px;
        }
        .menu-item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #f5efe8;
            margin-bottom: 2px;
        }
        .menu-item .price {
            display: inline-block;
            background: #c9a96e;
            color: #0a0505;
            font-weight: 700;
            padding: 2px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin: 4px 0 6px;
        }
        .menu-item p {
            color: #a89588;
            font-size: 0.8rem;
            line-height: 1.4;
        }
        .menu-item .add-to-cart {
            margin-top: 10px;
            background: #c9a96e;
            color: #0a0505;
            border: none;
            padding: 10px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .menu-item .add-to-cart:hover {
            background: #e8d5a8;
        }

        .popular-badge {
            display: inline-block;
            background: #c9a96e;
            color: #0a0505;
            font-size: 0.55rem;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: absolute;
            top: -6px;
            right: -6px;
        }

        .footer {
            background: #0a0505;
            text-align: center;
            padding: 18px;
            border-top: 1px solid #1a0f0f;
            color: #6b5a4a;
            font-size: 0.75rem;
            margin-top: 30px;
        }
        .footer span { color: #c9a96e; }

        @media (min-width: 500px) {
            .menu-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (min-width: 768px) {
            .nav .menu-toggle { display: none; }
            .nav .nav-links {
                display: flex !important;
                flex-direction: row;
                position: static;
                background: none;
                backdrop-filter: none;
                padding: 0;
                border: none;
                gap: 30px;
            }
            .nav .nav-links a {
                font-size: 0.85rem;
                padding: 6px 0;
                border-bottom: none;
                text-align: left;
            }
            .container { max-width: 900px; }
        }
    </style>
</head>
<body>

    <!-- НАВИГАЦИЯ -->
    <nav class="nav">
        <a href="index.html" class="logo">Вкусов<span>щина</span></a>
        <button class="menu-toggle" id="menuToggle" aria-label="Открыть меню">
            <span></span><span></span><span></span>
        </button>
        <div class="nav-links" id="navLinks">
            <a href="index.html">Главная</a>
            <a href="menu.html">Меню</a>
            <a href="roulette.html">Рулетка Вкуса</a>
        </div>
    </nav>

    <div class="container">
        <div class="section-header">
            <span class="subtitle">Наше меню</span>
            <h1>Гастрономическое путешествие</h1>
            <div class="section-line"></div>
        </div>

        <!-- ПОПУЛЯРНЫЕ -->
        <div class="popular-section">
            <h2>⭐ Популярные блюда</h2>
            <div class="menu-grid" id="popularGrid"></div>
        </div>

        <!-- ВСЁ МЕНЮ -->
        <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;color:#f5efe8;text-align:center;margin-bottom:18px;letter-spacing:1px;">Полное меню</h2>
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <footer class="footer">
        <p>© 2026 <span>«Вкусовщина»</span> — Премиум-ресторан</p>
        <p style="margin-top: 4px;">Шеф-повар <span>Родион Жуков</span></p>
    </footer>

    <script>
        // Бургер
        const toggle = document.getElementById('menuToggle');
        const links = document.getElementById('navLinks');
        toggle.addEventListener('click', function() {
            this.classList.toggle('active');
            links.classList.toggle('open');
        });
        links.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                toggle.classList.remove('active');
                links.classList.remove('open');
            });
        });

        // ДАННЫЕ
        const allDishes = [
            { name: 'Чай', emoji: '☕', price: '20 коп.', desc: 'Ароматный чёрный чай с бергамотом' },
            { name: 'Вафли', emoji: '🧇', price: '25 коп.', desc: 'Хрустящие вафли с варёной сгущёнкой' },
            { name: 'Конфеты', emoji: '🍬', price: '15 коп.', desc: 'Ассорти шоколадных конфет' },
            { name: 'Бутерброд с колбасой и батоном', emoji: '🥪', price: '30 коп.', desc: 'Классический бутерброд с докторской колбасой' },
            { name: 'Жареное яйцо', emoji: '🍳', price: '25 коп.', desc: 'Яичница-глазунья с зеленью' },
            { name: 'Вода', emoji: '💧', price: '10 коп.', desc: 'Питьевая вода без газа' },
            { name: 'Кола', emoji: '🥤', price: '20 коп.', desc: 'Освежающий газированный напиток' },
            { name: 'Яблоко', emoji: '🍏', price: '20 коп.', desc: 'Сочное яблоко (сорт «Гренни Смит»)' },
            { name: 'Квас', emoji: '🍺', price: '15 коп.', desc: 'Домашний квас на ржаном хлебе' },
            { name: 'Кофе', emoji: '☕', price: '15 коп.', desc: 'Чёрный кофе из свежемолотых зёрен' },
            { name: 'Картошка фри', emoji: '🍟', price: '30 коп.', desc: 'Золотистая картошка фри с солью' },
            { name: 'Гренки', emoji: '🍞', price: '20 коп.', desc: 'Хрустящие гренки с чесноком' },
            { name: 'Трубочки вафельные Вивайли', emoji: '🧇', price: '45 коп.', desc: 'Вафельные трубочки с кремовой начинкой' },
            { name: 'Пельмени', emoji: '🥟', price: '10 коп.', desc: 'Домашние пельмени с мясом, со сметаной' },
            { name: 'Чипсы', emoji: '🍟', price: '1 руб.', desc: 'Хрустящие картофельные чипсы (паприка)' },
            { name: 'Жвачка Love is', emoji: '🍬', price: '10 коп.', desc: 'Жевательная резинка со вкусом мяты' },
            { name: 'Булочки', emoji: '🥐', price: '50 коп.', desc: 'Сдобные булочки с маком' },
            { name: 'Жвачка арбузная', emoji: '🍉', price: '5 коп.', desc: 'Жевательная резинка со вкусом арбуза' },
            { name: 'Сок с трубочкой', emoji: '🧃', price: '30 коп.', desc: 'Яблочный сок с трубочкой' }
        ];

        const popularNames = ['Трубочки вафельные Вивайли', 'Чипсы', 'Кофе', 'Чай', 'Кола'];
        const popularDishes = allDishes.filter(d => popularNames.includes(d.name));
        const menuDishes = allDishes.filter(d => !popularNames.includes(d.name));

        function renderDishes(containerId, dishes, isPopular = false) {
            const container = document.getElementById(containerId);
            container.innerHTML = dishes.map(d => `
                <div class="menu-item">
                    ${isPopular ? '<span class="popular-badge">Популярное</span>' : ''}
                    <span class="emoji">${d.emoji}</span>
                    <h3>${d.name}</h3>
                    <span class="price">${d.price}</span>
                    <p>${d.desc}</p>
                    <button class="add-to-cart" data-name="${d.name}">Добавить в корзину</button>
                </div>
            `).join('');

            container.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', function() {
                    alert(`${this.dataset.name} добавлено в корзину! (демо-режим)`);
                });
            });
        }

        renderDishes('popularGrid', popularDishes, true);
        renderDishes('menuGrid', menuDishes, false);
    </script>

</body>
</html>
