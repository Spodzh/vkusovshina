<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Меню | Вкусовщина</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Roboto:wght@300;400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #0a0505;
            color: #f5efe8;
            line-height: 1.6;
            min-height: 100vh;
        }

        /* НАВИГАЦИЯ */
        .nav {
            background: rgba(10, 5, 5, 0.95);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #2a1a15;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #f5efe8;
            letter-spacing: 2px;
            text-decoration: none;
        }
        .nav .logo span { color: #c9a96e; }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }
        .nav-links a {
            color: #d4c9c0;
            text-decoration: none;
            font-weight: 300;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s;
            padding: 6px 0;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -2px;
            width: 0;
            height: 1px;
            background: #c9a96e;
            transition: width 0.3s;
        }
        .nav-links a:hover { color: #c9a96e; }
        .nav-links a:hover::after { width: 100%; }

        /* КОНТЕЙНЕР */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .section-header .subtitle {
            font-size: 0.7rem;
            color: #c9a96e;
            text-transform: uppercase;
            letter-spacing: 4px;
            display: block;
            margin-bottom: 6px;
        }
        .section-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 5vw, 3rem);
            color: #f5efe8;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: 2px;
        }
        .section-line {
            width: 40px;
            height: 2px;
            background: #c9a96e;
            margin: 0 auto;
        }

        /* ПОПУЛЯРНЫЕ */
        .popular-section {
            margin-bottom: 50px;
        }
        .popular-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: #c9a96e;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        /* СЕТКА */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .menu-item {
            background: rgba(26, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px 18px;
            border: 1px solid rgba(201, 169, 110, 0.15);
            transition: all 0.3s;
            text-align: center;
        }
        .menu-item:hover {
            border-color: #c9a96e;
            transform: translateY(-6px);
            box-shadow: 0 8px 30px rgba(201, 169, 110, 0.1);
        }
        .menu-item .emoji {
            font-size: 2.8rem;
            display: block;
            margin-bottom: 8px;
        }
        .menu-item h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #f5efe8;
            margin-bottom: 4px;
        }
        .menu-item .price {
            display: inline-block;
            background: #c9a96e;
            color: #0a0505;
            font-weight: 700;
            padding: 2px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin: 6px 0 8px;
        }
        .menu-item p {
            color: #a89588;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        .menu-item .add-to-cart {
            margin-top: 12px;
            background: #c9a96e;
            color: #0a0505;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }
        .menu-item .add-to-cart:hover {
            background: #e8d5a8;
            transform: scale(1.02);
        }

        .popular-badge {
            display: inline-block;
            background: #c9a96e;
            color: #0a0505;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 2px 12px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: absolute;
            top: -8px;
            right: -8px;
        }
        .menu-item {
            position: relative;
        }

        /* ПОДВАЛ */
        .footer {
            background: #0a0505;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #1a0f0f;
            color: #6b5a4a;
            font-size: 0.8rem;
            margin-top: 40px;
        }
        .footer span { color: #c9a96e; }

        @media (max-width: 768px) {
            .nav .nav-links { display: none; }
            .menu-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .menu-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- НАВИГАЦИЯ -->
    <nav class="nav">
        <a href="index.html" class="logo">Вкусов<span>щина</span></a>
        <div class="nav-links">
            <a href="index.html">Главная</a>
            <a href="menu.html">Меню</a>
            <a href="roulette.html">Рулетка Вкуса</a>
        </div>
    </nav>

    <div class="container">

        <!-- ЗАГОЛОВОК -->
        <div class="section-header">
            <span class="subtitle">Наше меню</span>
            <h1>Гастрономическое путешествие</h1>
            <div class="section-line"></div>
        </div>

        <!-- ПОПУЛЯРНЫЕ БЛЮДА -->
        <div class="popular-section">
            <h2>⭐ Популярные блюда</h2>
            <div class="menu-grid" id="popularGrid"></div>
        </div>

        <!-- ВСЁ МЕНЮ -->
        <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;color:#f5efe8;text-align:center;margin-bottom:25px;letter-spacing:2px;">Полное меню</h2>
        <div class="menu-grid" id="menuGrid"></div>

    </div>

    <footer class="footer">
        <p>© 2026 <span>«Вкусовщина»</span> — Премиум-ресторан</p>
        <p style="margin-top: 4px; font-size: 0.75rem;">Шеф-повар <span>Родион Жуков</span></p>
    </footer>

    <script>
        // ===== ДАННЫЕ =====
        const allDishes = [
            { name: 'Чай', emoji: '☕', price: '20 коп.', desc: 'Ароматный чёрный чай с бергамотом' },
            { name: 'Вафли', emoji: '🧇', price: '25 коп.', desc: 'Хрустящие вафли с варёной сгущёнкой' },
            { name: 'Конфеты', emoji: '🍬', price: '15 коп.', desc: 'Ассорти шоколадных конфет' },
            { name: 'Бутерброд с колбасой и батоном', emoji: '🥪', price: '30 коп.', desc: 'Классический бутерброд с докторской колбасой' },
            { name: 'Жареное яйцо', emoji: '🍳', price: '25 коп.', desc: 'Яичница-глазунья с зеленью' },
            { name: 'Вода', emoji: '💧', price: '10 коп.', desc: 'Питьевая вода без газа' },
            { name: 'Кола', emoji: '🥤', price: '20 коп.', desc: 'Освежающий газированный напиток' },
            { name: 'Яблоко', emoji: '🍏', price: '20 коп.', desc: 'Сочное яблоко (сорт «Гренни Смит»)' },
            { name: 'Квас', emoji: '🍺', price: '15 коп.', desc: 'Домашний квас на ржаном хлебе' },
            { name: 'Кофе', emoji: '☕', price: '15 коп.', desc: 'Чёрный кофе из свежемолотых зёрен' },
            { name: 'Картошка фри', emoji: '🍟', price: '30 коп.', desc: 'Золотистая картошка фри с солью' },
            { name: 'Гренки', emoji: '🍞', price: '20 коп.', desc: 'Хрустящие гренки с чесноком' },
            { name: 'Трубочки вафельные Вивайли', emoji: '🧇', price: '45 коп.', desc: 'Вафельные трубочки с кремовой начинкой' },
            { name: 'Пельмени', emoji: '🥟', price: '10 коп.', desc: 'Домашние пельмени с мясом, со сметаной' },
            { name: 'Чипсы', emoji: '🍟', price: '1 руб.', desc: 'Хрустящие картофельные чипсы (паприка)' },
            { name: 'Жвачка Love is', emoji: '🍬', price: '10 коп.', desc: 'Жевательная резинка со вкусом мяты' },
            { name: 'Булочки', emoji: '🥐', price: '50 коп.', desc: 'Сдобные булочки с маком' },
            { name: 'Жвачка арбузная', emoji: '🍉', price: '5 коп.', desc: 'Жевательная резинка со вкусом арбуза' },
            { name: 'Сок с трубочкой', emoji: '🧃', price: '30 коп.', desc: 'Яблочный сок с трубочкой' }
        ];

        const popularNames = ['Трубочки вафельные Вивайли', 'Чипсы', 'Кофе', 'Чай', 'Кола'];
        const popularDishes = allDishes.filter(d => popularNames.includes(d.name));
        const menuDishes = allDishes.filter(d => !popularNames.includes(d.name));

        function renderDishes(containerId, dishes) {
            const container = document.getElementById(containerId);
            container.innerHTML = dishes.map(d => `
                <div class="menu-item">
                    <span class="emoji">${d.emoji}</span>
                    <h3>${d.name}</h3>
                    <span class="price">${d.price}</span>
                    <p>${d.desc}</p>
                    <button class="add-to-cart" data-name="${d.name}">Добавить в корзину</button>
                </div>
            `).join('');

            container.querySelectorAll('.add-to-cart').forEach(btn => {
                btn.addEventListener('click', function() {
                    alert(`${this.dataset.name} добавлено в корзину! (демо-режим)`);
                });
            });
        }

        renderDishes('popularGrid', popularDishes);
        renderDishes('menuGrid', menuDishes);
    </script>

</body>
</html>
