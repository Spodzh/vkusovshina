    <script>
        // ===== ВСЯ ЛОГИКА =====
        const TELEGRAM_BOT_TOKEN = '8752139780:AAEIbtDqq2F3FJ2TqFWcINLWg6Zml8UyAQI';
        const TELEGRAM_CHAT_ID = '7892506421';
        const SERVER_URL = 'https://vkusovshina-server.onrender.com'; // <-- ВАШ URL

        // ... (все функции, кроме createOrder, остаются без изменений)

        // ----- СОЗДАНИЕ ЗАКАЗА (с отправкой на сервер) -----
        function createOrder(wish) {
            if (cart.length === 0) {
                alert('Корзина пуста!');
                return;
            }
            const userName = localStorage.getItem('userName') || 'Гость';
            const orderId = Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
            const total = cart.reduce((sum, d) => sum + parseFloat(d.price.replace(/\D/g,'')) || 0, 0);
            const dishesList = cart.map((d, i) => `${i+1}. ${d.emoji} ${d.name} (${d.price})`).join('\n');

            const orderData = {
                id: orderId,
                items: cart.map(d => ({ name: d.name, emoji: d.emoji, price: d.price })),
                total: total,
                wish: wish || 'Без пожеланий',
                userName: userName,
                createdAt: Date.now()
            };

            // Отправляем на сервер
            fetch(`${SERVER_URL}/orders`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            })
            .then(response => response.json())
            .then(data => {
                console.log('Заказ сохранён на сервере:', data);
                // Начисляем бонусы локально
                const bonusEarned = Math.floor(total * 0.1);
                let currentBonus = parseInt(localStorage.getItem('bonus')) || 0;
                currentBonus += bonusEarned;
                localStorage.setItem('bonus', currentBonus);

                // Отправляем в Telegram с кнопкой
                const msg = `🆕 <b>Новый заказ #${orderId}</b>\n\n👤 Имя: ${userName}\n📋 Блюда:\n${dishesList}\n💰 Сумма: ${total} коп.\n📝 Пожелание: ${wish || 'Нет'}\n\n🕒 Статус: готовится (10 минут)`;
                const inlineKeyboard = {
                    inline_keyboard: [
                        [{ text: '✅ Подтвердить заказ', callback_data: `confirm_${orderId}` }]
                    ]
                };
                sendTelegramMessageWithButton(msg, inlineKeyboard);

                clearCart();
                showOrderSuccess();
                document.getElementById('wishModal').classList.remove('open');
            })
            .catch(error => {
                console.error('Ошибка отправки заказа:', error);
                alert('Не удалось создать заказ. Попробуйте позже.');
            });
        }

        function sendTelegramMessageWithButton(text, keyboard) {
            const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
            return fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TELEGRAM_CHAT_ID,
                    text: text,
                    parse_mode: 'HTML',
                    reply_markup: keyboard,
                    disable_web_page_preview: true
                })
            })
            .then(r => r.json())
            .then(data => {
                if (!data.ok) throw new Error(data.description);
                console.log('✅ Сообщение с кнопкой отправлено');
            })
            .catch(err => console.error('❌ Ошибка:', err));
        }

        // ... остальной код (рендер меню, бургер, обработчики) без изменений
    </script>
